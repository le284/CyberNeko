name: Build Packages

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run Go tests
        run: go test ./...

  windows-amd64:
    name: Package Windows amd64
    runs-on: windows-latest
    timeout-minutes: 20
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails 3 CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.73
          "$(go env GOPATH)\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build Windows executable
        shell: pwsh
        run: |
          $env:ARCH = "amd64"
          wails3 task windows:build

      - name: Create zip package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/CyberNeko-windows-amd64 | Out-Null
          Copy-Item bin/CyberNeko.exe dist/CyberNeko-windows-amd64/CyberNeko.exe
          Compress-Archive -Path dist/CyberNeko-windows-amd64 -DestinationPath dist/CyberNeko-windows-amd64.zip -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: CyberNeko-windows-amd64
          path: dist/CyberNeko-windows-amd64.zip
          if-no-files-found: error

  macos:
    name: Package macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          - arch: amd64
            runner: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails 3 CLI
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.73
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build macOS app bundle
        run: |
          ARCH="${{ matrix.arch }}" wails3 task darwin:package

      - name: Create zip package
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "bin/CyberNeko.app" "dist/CyberNeko-macos-${{ matrix.arch }}.zip"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: CyberNeko-macos-${{ matrix.arch }}
          path: dist/CyberNeko-macos-${{ matrix.arch }}.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release assets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - windows-amd64
      - macos
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release

      - name: Show release assets
        run: find dist/release -maxdepth 3 -type f -print

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/**/*.zip
