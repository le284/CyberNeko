<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" type="image/svg+xml" href="/logo.svg"/>
    <link rel="stylesheet" href="/style.css"/>
    <title>CyberNeko</title>
</head>
<body>
<main id="pet-stage" aria-label="CyberNeko transparent pet stage">
    <div id="neko-speech" class="neko-speech-bubble" aria-live="polite"></div>
    <section
        id="neko"
        class="neko-hit-area"
        role="img"
        aria-label="CyberNeko desktop pet"
        data-state="idle"
    >
        <div class="neko-sprite" aria-hidden="true">
            <img id="pet-action-image" class="pet-action-image" alt=""/>
            <img id="pet-custom-image" class="pet-custom-image" alt=""/>
            <div class="neko-ear neko-ear-left"></div>
            <div class="neko-ear neko-ear-right"></div>
            <div class="neko-head">
                <div class="neko-eye neko-eye-left"></div>
                <div class="neko-eye neko-eye-right"></div>
                <div class="neko-muzzle"></div>
            </div>
            <div class="neko-body"></div>
            <div class="neko-tail"></div>
            <div class="neko-paw neko-paw-left"></div>
            <div class="neko-paw neko-paw-right"></div>
            <div class="neko-shadow"></div>
        </div>
    </section>
    <div class="neko-edge-ledge" aria-hidden="true"></div>
</main>

<main id="settings-panel" class="settings-shell" aria-labelledby="settings-title">
    <header class="settings-header">
        <div class="settings-brand">
            <img class="settings-logo" src="/logo.svg" alt=""/>
            <div>
                <h1 id="settings-title">CyberNeko</h1>
                <p>桌宠设置</p>
            </div>
        </div>
        <button id="settings-close" class="icon-button" type="button" aria-label="关闭设置">×</button>
    </header>

    <section class="settings-section" aria-labelledby="pet-count-title">
        <div class="section-heading">
            <h2 id="pet-count-title">启动宠物数量</h2>
            <output id="pet-count-output" for="pet-count-range pet-count-number">1</output>
        </div>
        <div class="count-controls">
            <input id="pet-count-range" type="range" min="1" max="1" step="1" value="1" aria-label="启动宠物数量"/>
            <input id="pet-count-number" type="number" min="1" max="1" step="1" value="1" aria-label="启动宠物数量数值"/>
            <button id="pet-count-save" class="primary-button" type="button">应用</button>
        </div>
    </section>

    <section class="settings-section" aria-labelledby="shortcut-title">
        <div class="section-heading">
            <h2 id="shortcut-title">行为快捷键</h2>
        </div>
        <div id="shortcut-list" class="shortcut-list"></div>
        <button id="shortcut-save" class="primary-button shortcut-save" type="button">应用快捷键</button>
    </section>

    <section class="settings-section" aria-labelledby="pet-images-title">
        <div class="section-heading">
            <h2 id="pet-images-title">宠物图片</h2>
        </div>
        <div id="pet-image-list" class="pet-image-list"></div>
    </section>

    <p id="settings-status" class="settings-status" role="status" aria-live="polite"></p>
</main>

<script type="module" src="/src/main.js"></script>
</body>
</html>
